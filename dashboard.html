<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TrimLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body class="min-h-screen flex flex-col antialiased bg-slate-900 text-slate-50 relative selection:bg-indigo-500/30 selection:text-indigo-200">

    <!-- Navbar -->
    <nav class="bg-slate-900 border-b border-slate-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    <a href="index.html" class="text-xl font-bold tracking-tight text-white">Trim<span class="text-indigo-500">Link</span> <span class="font-normal text-slate-500 ml-1 text-sm">Dashboard</span></a>
                </div>
                <a href="index.html" class="text-sm font-semibold text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition-colors border border-slate-700">&larr; Back to Shortener</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 z-10 relative">
        
        <!-- Header -->
        <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Analytics Overview</h1>
                <p class="text-slate-400 mt-1 text-sm">Track the performance of your shortened links.</p>
            </div>
            
            <!-- Search Box -->
            <div class="relative max-w-xs w-full">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="search-input" placeholder="Search links..." class="w-full bg-slate-800 border border-slate-700 text-white transition-colors rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 shadow-inner">
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="stats-container">
            <!-- Card 1 -->
            <div class="bg-slate-800 border border-slate-700 shadow-md p-6 rounded-xl">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-indigo-500/10 border border-indigo-500/20 rounded-lg">
                        <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-slate-400">Total Links</p>
                        <p class="text-2xl font-bold text-white" id="stat-total-links">-</p>
                    </div>
                </div>
            </div>
            <!-- Card 2 -->
            <div class="bg-slate-800 border border-slate-700 shadow-md p-6 rounded-xl">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-purple-500/10 border border-purple-500/20 rounded-lg">
                        <svg class="w-7 h-7 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-slate-400">Total Clicks</p>
                        <p class="text-2xl font-bold text-white" id="stat-total-clicks">-</p>
                    </div>
                </div>
            </div>
            <!-- Card 3 -->
            <div class="bg-slate-800 border border-slate-700 shadow-md p-6 rounded-xl">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-green-500/10 border border-green-500/20 rounded-lg">
                        <svg class="w-7 h-7 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-slate-400">Most Clicks (Single Link)</p>
                        <p class="text-2xl font-bold text-white" id="stat-most-clicks">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Links Table -->
        <div class="bg-slate-800 border border-slate-700 shadow-md rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-300">
                    <thead class="bg-slate-900/50 border-b border-slate-700 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                        <tr>
                            <th scope="col" class="px-6 py-4">Original URL</th>
                            <th scope="col" class="px-6 py-4">Short URL</th>
                            <th scope="col" class="px-6 py-4 text-center">Clicks</th>
                            <th scope="col" class="px-6 py-4">Created Date</th>
                            <th scope="col" class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-700/50" id="links-tbody">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-slate-500">Loading links...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-slate-800 shadow-2xl p-6 rounded-2xl max-w-sm w-full text-center relative border border-slate-700">
            <button id="qr-close" class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h3 class="text-xl font-bold text-white mb-4">QR Code</h3>
            <div class="bg-slate-900 border border-slate-700 p-4 rounded-xl inline-block mb-4">
                <img id="qr-image" src="" alt="QR Code" class="w-48 h-48 mx-auto bg-white rounded-lg p-2">
            </div>
            <p class="text-sm text-slate-400">Scan this QR code to visit the link.</p>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadDashboardData === 'function') loadDashboardData();
        });
    </script>
</body>
</html>
